<!doctype html>
<html lang="en-US">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Screencastgen Demo Reader</title>
<style>
:root{--bg:#f6f1e7;--fg:#29251f;--surface:#fffdf7;--border:#d8d0c3;--muted:#746d63;--active:#fde047;--hover:#eee7da}
:root.night{--bg:#171717;--fg:#eee9df;--surface:#242424;--border:#404040;--muted:#aaa39a;--active:#a16207;--hover:#333}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:16px/1.65 Georgia,serif}
header{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border)}
h1{font:600 18px/1.2 system-ui,sans-serif;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
button,select,input{font:inherit}button,select,.repo-link{color:var(--fg);background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 10px;cursor:pointer}.repo-link{font:14px/1 system-ui,sans-serif;text-decoration:none;display:inline-block}
main{display:block;max-width:860px;margin:auto;padding:26px 24px 120px}
main.has-document{display:grid;grid-template-columns:minmax(280px,420px) minmax(0,720px);gap:28px;max-width:1220px}
#page-panel{display:none;position:sticky;top:82px;align-self:start;background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden}
main.has-document #page-panel{display:block}
#page-label{padding:9px 14px;color:var(--muted);font:12px system-ui,sans-serif;text-transform:uppercase;letter-spacing:.12em;border-bottom:1px solid var(--border)}
#page-image{display:block;width:100%;height:auto}
#source-pdf{display:block;width:100%;height:calc(100vh - 150px);min-height:520px;border:0;background:#fff}
#text{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 34px;min-height:50vh}
.page h2{font:600 12px system-ui,sans-serif;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:24px 0 8px}.page:first-child h2{margin-top:0}
p{margin:.7em 0}h1,h2,h3,h4{line-height:1.25}article h1{font-size:2rem}article h2{font-size:1.55rem}article h3{font-size:1.25rem}article pre{overflow:auto;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px}article code{background:var(--hover);border-radius:4px;padding:1px 4px;font-size:.9em}article pre code{background:transparent;padding:0}blockquote{border-left:4px solid var(--border);margin:1em 0;padding-left:1em;color:var(--muted)}table{width:100%;border-collapse:collapse;margin:1em 0}th,td{border:1px solid var(--border);padding:6px 10px;text-align:left}hr{border:0;border-top:1px solid var(--border);margin:2em 0}.word{border-radius:3px;padding:1px 2px}.word.active{background:var(--active);color:#1f1b14}.word:hover{background:var(--hover);cursor:pointer}
#pip{position:fixed;z-index:30;left:24px;top:76px;width:280px;min-width:180px;max-width:70vw;background:#000;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 12px 34px #0007;resize:both}
#pip.hidden{display:none}#pipbar{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:#202020;color:#fff;font:12px system-ui,sans-serif;cursor:move;user-select:none}#pipbar button{padding:0 5px;background:transparent;color:#fff;border:0}video{display:block;width:100%;height:calc(100% - 28px);object-fit:contain;background:#000}
footer{position:fixed;z-index:20;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -8px 24px #0002;padding:12px 18px;font:13px system-ui,sans-serif}
.controls{display:flex;gap:12px;align-items:center;max-width:900px;margin:auto}.controls input[type=range]{flex:1}.time{font-variant-numeric:tabular-nums;color:var(--muted);min-width:42px}.play{width:45px;height:45px;border-radius:50%;font-size:18px;padding:0}.check{display:flex;gap:6px;align-items:center;color:var(--muted);white-space:nowrap}
#show-presenter{display:none}
@media(max-width:760px){main,main.has-document{display:block;padding:16px 14px 120px}main.has-document #page-panel{position:relative;top:auto;margin-bottom:18px;max-height:45vh}#page-image{max-height:45vh;object-fit:contain}#source-pdf{height:45vh;min-height:260px}#text{padding:22px 20px}#pip{width:220px}.check{display:none}}
</style>

<script id="reader-data" type="application/json">{"version": 1, "title": "Screencastgen Demo Reader", "language": "en-US", "source_type": "md", "source_markdown": "# LLM Wiki\n\nA pattern for building personal knowledge bases using LLMs.\n\nThis is an idea file, it is designed to be copy pasted to your own LLM Agent (e.g. OpenAI Codex, Claude Code, OpenCode / Pi, or etc.). Its goal is to communicate the high level idea, but your agent will build out the specifics in collaboration with you.\n\n## The core idea\n\nMost people's experience with LLMs and documents looks like RAG: you upload a collection of files, the LLM retrieves relevant chunks at query time, and generates an answer. This works, but the LLM is rediscovering knowledge from scratch on every question. There's no accumulation. Ask a subtle question that requires synthesizing five documents, and the LLM has to find and piece together the relevant fragments every time. Nothing is built up. NotebookLM, ChatGPT file uploads, and most RAG systems work this way.\n\nThe idea here is different. Instead of just retrieving from raw documents at query time, the LLM **incrementally builds and maintains a persistent wiki** — a structured, interlinked collection of markdown files that sits between you and the raw sources. When you add a new source, the LLM doesn't just index it for later retrieval. It reads it, extracts the key information, and integrates it into the existing wiki — updating entity pages, revising topic summaries, noting where new data contradicts old claims, strengthening or challenging the evolving synthesis. The knowledge is compiled once and then *kept current*, not re-derived on every query.\n\nThis is the key difference: **the wiki is a persistent, compounding artifact.** The cross-references are already there. The contradictions have already been flagged. The synthesis already reflects everything you've read. The wiki keeps getting richer with every source you add and every question you ask.\n\nYou never (or rarely) write the wiki yourself — the LLM writes and maintains all of it. You're in charge of sourcing, exploration, and asking the right questions. The LLM does all the grunt work — the summarizing, cross-referencing, filing, and bookkeeping that makes a knowledge base actually useful over time. In practice, I have the LLM agent open on one side and Obsidian open on the other. The LLM makes edits based on our conversation, and I browse the results in real time — following links, checking the graph view, reading the updated pages. Obsidian is the IDE; the LLM is the programmer; the wiki is the codebase.\n\nThis can apply to a lot of different contexts. A few examples:\n\n- **Personal**: tracking your own goals, health, psychology, self-improvement — filing journal entries, articles, podcast notes, and building up a structured picture of yourself over time.\n- **Research**: going deep on a topic over weeks or months — reading papers, articles, reports, and incrementally building a comprehensive wiki with an evolving thesis.\n- **Reading a book**: filing each chapter as you go, building out pages for characters, themes, plot threads, and how they connect. By the end you have a rich companion wiki. Think of fan wikis like [Tolkien Gateway](https://tolkiengateway.net/wiki/Main_Page) — thousands of interlinked pages covering characters, places, events, languages, built by a community of volunteers over years. You could build something like that personally as you read, with the LLM doing all the cross-referencing and maintenance.\n- **Business/team**: an internal wiki maintained by LLMs, fed by Slack threads, meeting transcripts, project documents, customer calls. Possibly with humans in the loop reviewing updates. The wiki stays current because the LLM does the maintenance that no one on the team wants to do.\n- **Competitive analysis, due diligence, trip planning, course notes, hobby deep-dives** — anything where you're accumulating knowledge over time and want it organized rather than scattered.\n\n## Architecture\n\nThere are three layers:\n\n**Raw sources** — your curated collection of source documents. Articles, papers, images, data files. These are immutable — the LLM reads from them but never modifies them. This is your source of truth.\n\n**The wiki** — a directory of LLM-generated markdown files. Summaries, entity pages, concept pages, comparisons, an overview, a synthesis. The LLM owns this layer entirely. It creates pages, updates them when new sources arrive, maintains cross-references, and keeps everything consistent. You read it; the LLM writes it.\n\n**The schema** — a document (e.g. CLAUDE.md for Claude Code or AGENTS.md for Codex) that tells the LLM how the wiki is structured, what the conventions are, and what workflows to follow when ingesting sources, answering questions, or maintaining the wiki. This is the key configuration file — it's what makes the LLM a disciplined wiki maintainer rather than a generic chatbot. You and the LLM co-evolve this over time as you figure out what works for your domain.\n\n## Operations\n\n**Ingest.** You drop a new source into the raw collection and tell the LLM to process it. An example flow: the LLM reads the source, discusses key takeaways with you, writes a summary page in the wiki, updates the index, updates relevant entity and concept pages across the wiki, and appends an entry to the log. A single source might touch 10-15 wiki pages. Personally I prefer to ingest sources one at a time and stay involved — I read the summaries, check the updates, and guide the LLM on what to emphasize. But you could also batch-ingest many sources at once with less supervision. It's up to you to develop the workflow that fits your style and document it in the schema for future sessions.\n\n**Query.** You ask questions against the wiki. The LLM searches for relevant pages, reads them, and synthesizes an answer with citations. Answers can take different forms depending on the question — a markdown page, a comparison table, a slide deck (Marp), a chart (matplotlib), a canvas. The important insight: **good answers can be filed back into the wiki as new pages.** A comparison you asked for, an analysis, a connection you discovered — these are valuable and shouldn't disappear into chat history. This way your explorations compound in the knowledge base just like ingested sources do.\n\n**Lint.** Periodically, ask the LLM to health-check the wiki. Look for: contradictions between pages, stale claims that newer sources have superseded, orphan pages with no inbound links, important concepts mentioned but lacking their own page, missing cross-references, data gaps that could be filled with a web search. The LLM is good at suggesting new questions to investigate and new sources to look for. This keeps the wiki healthy as it grows.\n\n## Indexing and logging\n\nTwo special files help the LLM (and you) navigate the wiki as it grows. They serve different purposes:\n\n**index.md** is content-oriented. It's a catalog of everything in the wiki — each page listed with a link, a one-line summary, and optionally metadata like date or source count. Organized by category (entities, concepts, sources, etc.). The LLM updates it on every ingest. When answering a query, the LLM reads the index first to find relevant pages, then drills into them. This works surprisingly well at moderate scale (~100 sources, ~hundreds of pages) and avoids the need for embedding-based RAG infrastructure.\n\n**log.md** is chronological. It's an append-only record of what happened and when — ingests, queries, lint passes. A useful tip: if each entry starts with a consistent prefix (e.g. `## [2026-04-02] ingest | Article Title`), the log becomes parseable with simple unix tools — `grep \"^## \\[\" log.md | tail -5` gives you the last 5 entries. The log gives you a timeline of the wiki's evolution and helps the LLM understand what's been done recently.\n\n## Optional: CLI tools\n\nAt some point you may want to build small tools that help the LLM operate on the wiki more efficiently. A search engine over the wiki pages is the most obvious one — at small scale the index file is enough, but as the wiki grows you want proper search. [qmd](https://github.com/tobi/qmd) is a good option: it's a local search engine for markdown files with hybrid BM25/vector search and LLM re-ranking, all on-device. It has both a CLI (so the LLM can shell out to it) and an MCP server (so the LLM can use it as a native tool). You could also build something simpler yourself — the LLM can help you vibe-code a naive search script as the need arises.\n\n## Tips and tricks\n\n- **Obsidian Web Clipper** is a browser extension that converts web articles to markdown. Very useful for quickly getting sources into your raw collection.\n- **Download images locally.** In Obsidian Settings → Files and links, set \"Attachment folder path\" to a fixed directory (e.g. `raw/assets/`). Then in Settings → Hotkeys, search for \"Download\" to find \"Download attachments for current file\" and bind it to a hotkey (e.g. Ctrl+Shift+D). After clipping an article, hit the hotkey and all images get downloaded to local disk. This is optional but useful — it lets the LLM view and reference images directly instead of relying on URLs that may break. Note that LLMs can't natively read markdown with inline images in one pass — the workaround is to have the LLM read the text first, then view some or all of the referenced images separately to gain additional context. It's a bit clunky but works well enough.\n- **Obsidian's graph view** is the best way to see the shape of your wiki — what's connected to what, which pages are hubs, which are orphans.\n- **Marp** is a markdown-based slide deck format. Obsidian has a plugin for it. Useful for generating presentations directly from wiki content.\n- **Dataview** is an Obsidian plugin that runs queries over page frontmatter. If your LLM adds YAML frontmatter to wiki pages (tags, dates, source counts), Dataview can generate dynamic tables and lists.\n- The wiki is just a git repo of markdown files. You get version history, branching, and collaboration for free.\n\n## Why this works\n\nThe tedious part of maintaining a knowledge base is not the reading or the thinking — it's the bookkeeping. Updating cross-references, keeping summaries current, noting when new data contradicts old claims, maintaining consistency across dozens of pages. Humans abandon wikis because the maintenance burden grows faster than the value. LLMs don't get bored, don't forget to update a cross-reference, and can touch 15 files in one pass. The wiki stays maintained because the cost of maintenance is near zero.\n\nThe human's job is to curate sources, direct the analysis, ask good questions, and think about what it all means. The LLM's job is everything else.\n\nThe idea is related in spirit to Vannevar Bush's Memex (1945) — a personal, curated knowledge store with associative trails between documents. Bush's vision was closer to this than to what the web became: private, actively curated, with the connections between documents as valuable as the documents themselves. The part he couldn't solve was who does the maintenance. The LLM handles that.\n\n\n## Note\n\nThis document is intentionally abstract. It describes the idea, not a specific implementation. The exact directory structure, the schema conventions, the page formats, the tooling — all of that will depend on your domain, your preferences, and your LLM of choice. Everything mentioned above is optional and modular — pick what's useful, ignore what isn't. For example: your sources might be text-only, so you don't need image handling at all. Your wiki might be small enough that the index file is all you need, no search engine required. You might not care about slide decks and just want markdown pages. You might want a completely different set of output formats. The right way to use this is to share it with your LLM agent and work together to instantiate a version that fits your needs. The document's only job is to communicate the pattern. Your LLM can figure out the rest.\n", "duration": 572.16, "audio": "reader_audio.mp3", "presenter": "presenter.mp4", "pages": null, "chunks": [{"chunk_num": 1, "text": "LLM Wiki A pattern for building personal knowledge bases using LLMs. This is an idea file, it is designed to be copy pasted to your own LLM Agent (e.g. Open AI Codex, Claude Code, Open Code / Pi, or etc.). Its goal is to communicate the high level idea, but your agent will build out the specifics in collaboration with you. The core idea Most people's experience with LLMs and documents looks like RAG: you upload a collection of files, the LLM retrieves relevant chunks at query time, and generates an answer. This works, but the LLM is rediscovering knowledge from scratch on every question. There's no accumulation. Ask a subtle question that requires synthesizing five documents, and the LLM has to find and piece together the relevant fragments every time. Nothing is built up. Notebook LM, Chat GPT file uploads, and most RAG systems work this way. The idea here is different. Instead of just retrieving from raw documents at query time, the LLM incrementally builds and maintains a persistent wiki — a structured, interlinked collection of markdown files that sits between you and the raw sources. When you add a new source, the LLM doesn't just index it for later retrieval. It reads it, extracts the key information, and integrates it into the existing wiki — updating entity pages, revising topic summaries, noting where new data contradicts old claims, strengthening or challenging the evolving synthesis.", "offset": 0.0, "pages": [1], "words": [{"word": "LLM", "start": 2.989, "end": 3.309}, {"word": "wiki", "start": 3.389, "end": 3.67}, {"word": "a", "start": 3.77, "end": 3.89}, {"word": "pattern", "start": 3.97, "end": 4.27}, {"word": "for", "start": 4.33, "end": 4.43}, {"wor rely) write the wiki yourself — the LLM writes and maintains all of it. You're in charge of sourcing, exploration, and asking the right questions. The LLM does all the grunt work — the summarizing, cross-referencing, filing, and bookkeeping that makes a knowledge base actually useful over time. In practice, I have the LLM agent open on one side and Obsidian open on the other. The LLM makes edits based on our conversation, and I browse the results in real time — following links, checking the graph view, reading the updated pages. Obsidian is the IDE. the LLM is the programmer. the wiki is the codebase. This can apply to a lot of different contexts. A few examples. Personal: tracking your own goals, health, psychology, self-improvement — filing journal entries, articles, podcast notes, and building up a structured picture of yourself over time. Research: going deep on a topic over weeks or months — reading papers, articles, reports, and incrementally building a comprehensive wiki with an evolving thesis.", "offset": 73.68, "pages": [1], "words": [{"word": "The", "start": 73.871, "end": 73.951}, {"word": "knowledge", "start": 73.991, "end": 74.291}, {"word": "is", "start": 74.372, "end": 74.432}, {"word": "compiled", "start": 74.472, "end": 74.832}, {"word": "once", "start": 74.932, "end": 75.092}, {"word": "and", "start": 75.432, "end": 75.492}, {"word": "then", "start": 75.512, "end": 75.653}, {"word": "kept", "start": 75.693, "end": 75.893}, {"word": "current,", "start": 75.933, "end": 76.233}, {"word": "not", "start": 76.393, "end": 76.513}, {"word": "rederived", "start": 76.573, "end": 77.094}, {"word": "on", "start": 77.174, "end": 77.234}, {"word": "every", "start": 77.314, "end": 77.474}, {"word": "query.", "start": 77.514, "end": 77.814}, {"word": "This", "start": 78.375, "end": 78.535}, {"word": "is", "start": 78.595, "end": 78.675}, {"word": "the", "start": 78.695, "end": 78.775}, {"word": "key", "start": 78.795, "end": 78.935}, {"word": "difference.", "star , {"word": "value.", "start": 498.504, "end": 498.744}]}, {"chunk_num": 8, "text": "LLMs don't get bored, don't forget to update a cross-reference, and can touch 15 files in one pass. The wiki stays maintained because the cost of maintenance is near zero. The human's job is to curate sources, direct the analysis, ask good questions, and think about what it all means. The LLM's job is everything else. The idea is related in spirit to Vannevar Bush's Memex (1945) — a personal, curated knowledge store with associative trails between documents. Bush's vision was closer to this than to what the web became: private, actively curated, with the connections between documents as valuable as the documents themselves. The part he couldn't solve was who does the maintenance. The LLM handles that. Note This document is intentionally abstract. It describes the idea, not a specific implementation. The exact directory structure, the schema conventions, the page formats, the tooling — all of that will depend on your domain, your preferences, and your LLM of choice. Everything mentioned above is optional and modular — pick what's useful, ignore what isn't. For example: your sources might be text-only, so you don't need image handling at all. Your wiki might be small enough that the index file is all you need, no search engine required. You might not care about slide decks and just want markdown pages. You might want a completely different set of output formats.", "offset": 498.72, "pages": [1], "words": [{"word": "The", "start": 498.831, "end": 498.891}, {"word": "LM's", "start": 498.911, "end": 499.131}, {"word": "don't", "start": 499.291, "end": 499.431}, {"word": "get", "start": 499.451, "end": 499.551}, {"word": "bored,", "start": 499.591, "end": 499.811}, {"word": "don't", "start": 500.031, "end": 500.171}, {"word": "forget", "start": 500.191, "end": 500.391}, {"word": "to", "start": 500.411, "end": 500.491}, {"word": "update", "start": 500.551, "end": 500.791}, {"word": "across"
