name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - assets/demo-reader/**
      - docs/**
      - .github/workflows/docs.yml
      - INSTALLATION.md
      - mkdocs.yml
      - pyproject.toml
  pull_request:
    paths:
      - assets/demo-reader/**
      - docs/**
      - .github/workflows/docs.yml
      - INSTALLATION.md
      - mkdocs.yml
      - pyproject.toml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install documentation dependencies
        run: python -m pip install -e ".[docs]"

      - name: Build documentation
        run: mkdocs build --strict

      - name: Add demo reader
        run: cp -R assets/demo-reader site/demo-reader

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
