version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: screencastgen
      POSTGRES_PASSWORD: screencastgen
      POSTGRES_DB: screencastgen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U screencastgen"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: web/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      P2A_DATABASE_URL: postgresql+asyncpg://screencastgen:screencastgen@postgres:5432/screencastgen
      P2A_SYNC_DATABASE_URL: postgresql+psycopg2://screencastgen:screencastgen@postgres:5432/screencastgen
      P2A_REDIS_URL: redis://redis:6379/0
      P2A_UPLOAD_DIR: /data/uploads
      P2A_OUTPUT_DIR: /data/outputs
      P2A_ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      P2A_TTS_TIMEOUT: ${P2A_TTS_TIMEOUT:-43200}
    volumes:
      - appdata:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: web/Dockerfile.backend
    command: celery -A web.backend.tasks.celery_app:celery_app worker --loglevel=info --concurrency=1
    environment:
      P2A_DATABASE_URL: postgresql+asyncpg://screencastgen:screencastgen@postgres:5432/screencastgen
      P2A_SYNC_DATABASE_URL: postgresql+psycopg2://screencastgen:screencastgen@postgres:5432/screencastgen
      P2A_REDIS_URL: redis://redis:6379/0
      P2A_UPLOAD_DIR: /data/uploads
      P2A_OUTPUT_DIR: /data/outputs
      P2A_TTS_TIMEOUT: ${P2A_TTS_TIMEOUT:-43200}
    volumes:
      - appdata:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  appdata:
